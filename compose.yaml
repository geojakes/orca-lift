# Container Manager / docker-compose definition for running orca-lift on a
# Synology NAS. Image is built on a workstation (see deploy/synology/README.md)
# and loaded onto the NAS — Container Manager Project then references this file.

services:
  orca-lift:
    image: orca-lift:latest
    container_name: orca-lift
    restart: unless-stopped
    ports:
      # Bind to all interfaces on the LAN. DSM's firewall still applies.
      - "8000:8000"
    volumes:
      # Persistent SQLite + any other runtime state
      - /volume1/docker/orca-lift/data:/data
    environment:
      # See .env.example. Container Manager UI lets you set these per-project.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Uncomment to use a Claude Code OAuth token instead of a pay-as-you-go
      # API key (see deploy/synology/README.md → "Claude Code OAuth").
      # CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      ORCA_LIFT_DATA_DIR: /data
      TZ: ${TZ:-America/Los_Angeles}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
